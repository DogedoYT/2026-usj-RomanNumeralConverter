<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roman ↔ Integer Converter (Refactored)</title>
    <style>
        /* Same CSS as before - preserved */
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
        }
        body {
            background: linear-gradient(145deg, #f8f3e7 0%, #e8dfd1 100%);
            min-height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .card {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(4px);
            width: min(90%, 600px);
            padding: 2rem 2rem 2.5rem;
            border-radius: 3rem 1rem 3rem 1rem;
            box-shadow: 0 25px 40px -10px rgba(0, 0, 0, 0.3), inset 0 0 0 1px rgba(255, 245, 215, 0.7);
            border: 1px solid #c9b386;
            transition: all 0.2s;
        }
        h1 {
            font-weight: 400;
            font-size: 2.2rem;
            letter-spacing: 2px;
            color: #3d2f1f;
            margin: 0 0 0.25rem;
            text-shadow: 2px 2px 0 #e0cba0;
            border-bottom: 2px dashed #a38e6b;
            padding-bottom: 0.5rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }
        h1 span {
            font-size: 1.8rem;
            background: #6a5e4d;
            color: #fef2dd;
            padding: 0.2rem 0.9rem;
            border-radius: 60px;
            box-shadow: inset 0 -2px 0 #3a2e1e;
        }
        .converter-grid {
            display: flex;
            flex-direction: column;
            gap: 2rem;
            margin: 2rem 0 1rem;
        }
        .direction {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 0.8rem 1rem;
        }
        .label-icon {
            font-size: 1.3rem;
            background: #d4c5ad;
            color: #2f2a21;
            padding: 0.3rem 0.9rem;
            border-radius: 40px;
            font-weight: 600;
            border: 1px solid #aa9b84;
        }
        input {
            flex: 2 1 220px;
            background: #fffcf3;
            border: 2px solid #b7a07e;
            border-radius: 60px;
            padding: 0.9rem 1.5rem;
            font-size: 1.2rem;
            font-weight: 500;
            color: #2d2419;
            outline: none;
            transition: 0.15s;
            box-shadow: inset 2px 2px 8px rgba(0,0,0,0.05);
        }
        input:focus {
            border-color: #6f5230;
            background: #fffffc;
            box-shadow: 0 0 0 4px #d9c9b0;
        }
        button {
            background: #5f4e36;
            border: none;
            border-radius: 60px;
            padding: 0.9rem 2rem;
            font-size: 1.2rem;
            font-weight: 600;
            color: #fcf3e0;
            cursor: pointer;
            transition: 0.15s;
            border: 1px solid #9f8d72;
            box-shadow: 0 5px 0 #3a2e1f, 0 6px 12px black(0,0,0,0.3);
            letter-spacing: 0.5px;
        }
        button:hover {
            background: #6e5b40;
            transform: translateY(-2px);
            box-shadow: 0 7px 0 #3a2e1f, 0 10px 18px rgba(0,0,0,0.2);
        }
        button:active {
            transform: translateY(5px);
            box-shadow: 0 2px 0 #3a2e1f, 0 6px 10px rgba(0,0,0,0.2);
        }
        .swap-area {
            display: flex;
            justify-content: center;
            margin: 0.5rem 0;
        }
        #swapBtn {
            background: #b29b80;
            font-size: 1.8rem;
            padding: 0.5rem 2rem;
            border-radius: 60px;
            line-height: 1;
            color: #2f281d;
            border: 2px solid #6b5d49;
            box-shadow: 0 4px 0 #584b39;
        }
        #swapBtn:hover {
            background: #cabaa5;
        }
        .error-area {
            min-height: 3.8rem;
            margin: 1.5rem 0 0.8rem;
        }
        .error-message {
            background: #f4d1c1;
            border-left: 12px solid #b9512b;
            color: #3e1f10;
            padding: 1rem 1.8rem;
            border-radius: 100px 20px 100px 20px;
            font-weight: 600;
            font-size: 1.35rem;
            display: inline-block;
            box-shadow: 0 4px 10px rgba(160, 70, 20, 0.3);
        }
        .info-note {
            font-size: 0.95rem;
            color: #5e4f39;
            background: #e5d6be;
            padding: 0.4rem 1.5rem;
            border-radius: 100px;
            display: inline-block;
            border: 1px solid #b09873;
        }
        hr {
            border: none;
            height: 2px;
            background: linear-gradient(to right, transparent, #bba77e, transparent);
            margin: 1.2rem 0 0.2rem;
        }
        .footer-hint {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.5rem;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>
            <span>Ⅿ</span>
            Roman ↔ Integer
            <span>13</span>
        </h1>

        <div class="converter-grid">
            <div class="direction">
                <span class="label-icon">Ⅿ → ⓿</span>
                <input type="text" id="romanInput" placeholder="e.g. ⅩⅣ or XIV" value="XIV">
                <button id="toIntegerBtn">CONVERT ↓</button>
            </div>

            <div class="direction">
                <span class="label-icon">⓿ → Ⅿ</span>
                <input type="number" id="intInput" placeholder="1 ... 3999" value="2024" min="1" max="3999">
                <button id="toRomanBtn">CONVERT ↑</button>
            </div>

            <div class="swap-area">
                <button id="swapBtn">⇆ swap ⇆</button>
            </div>
        </div>

        <div class="error-area" id="errorMessageContainer"></div>

        <hr>
        <div class="footer-hint">
            <span class="info-note">✔ only I, V, X, L, C, D, M (max 3999)</span>
            <span class="info-note">grammar: 4 = IV, 9 = IX, etc.</span>
        </div>
    </div>

    <!-- Load the shared converter logic -->
    <script src="roman-converter.js"></script>
    
    <!-- UI Controller -->
    <script>
        // ========== DOM Elements ==========
        class DOMElements {
            constructor() {
                this.romanInput = document.getElementById('romanInput');
                this.intInput = document.getElementById('intInput');
                this.toIntegerBtn = document.getElementById('toIntegerBtn');
                this.toRomanBtn = document.getElementById('toRomanBtn');
                this.swapBtn = document.getElementById('swapBtn');
                this.errorContainer = document.getElementById('errorMessageContainer');
            }
        }

        // ========== UI Controller ==========
        class UIController {
            constructor(elements) {
                this.dom = elements;
                this.setupEventListeners();
                this.initialize();
            }

            setupEventListeners() {
                this.dom.toIntegerBtn.addEventListener('click', (e) => {
                    e.preventDefault();
                    this.convertRomanToInteger();
                });

                this.dom.toRomanBtn.addEventListener('click', (e) => {
                    e.preventDefault();
                    this.convertIntegerToRoman();
                });

                this.dom.swapBtn.addEventListener('click', (e) => {
                    e.preventDefault();
                    this.swapValues();
                });

                this.dom.romanInput.addEventListener('input', () => this.clearError());
                this.dom.intInput.addEventListener('input', () => this.clearError());
            }

            initialize() {
                const initialValue = 2024;
                this.dom.intInput.value = initialValue;
                this.dom.romanInput.value = RomanConverter.fromInteger(initialValue);
                this.clearError();
            }

            showError(message) {
                if (!message) {
                    this.dom.errorContainer.innerHTML = '';
                    return;
                }
                this.dom.errorContainer.innerHTML = `<div class="error-message">⚠️ ${message}</div>`;
            }

            clearError() {
                this.dom.errorContainer.innerHTML = '';
            }

            convertRomanToInteger() {
                this.clearError();
                const roman = this.dom.romanInput.value.trim();

                if (roman === '') {
                    this.showError('Enter a Roman numeral');
                    return;
                }

                const result = RomanConverter.toInteger(roman);

                if (!result.success) {
                    this.showError('That Roman number doesn\'t exist');
                    return;
                }

                this.dom.intInput.value = result.value;
            }

            convertIntegerToRoman() {
                this.clearError();
                const validation = IntegerValidator.validate(this.dom.intInput.value);

                if (!validation.success) {
                    this.showError(validation.error);
                    return;
                }

                const roman = RomanConverter.fromInteger(validation.value);
                this.dom.romanInput.value = roman;
            }

            swapValues() {
                this.clearError();

                const roman = this.dom.romanInput.value.trim();
                const intValue = this.dom.intInput.value.trim();

                let sourceNumber = this.getValidNumber(roman, intValue);

                const newRoman = RomanConverter.fromInteger(sourceNumber);
                this.dom.romanInput.value = newRoman;
                this.dom.intInput.value = sourceNumber;
            }

            getValidNumber(roman, intValue) {
                const romanResult = RomanConverter.toInteger(roman);
                if (romanResult.success) {
                    return romanResult.value;
                }

                const intValidation = IntegerValidator.validate(intValue);
                if (intValidation.success) {
                    return intValidation.value;
                }

                return 1;
            }
        }

        // Initialize the UI
        const elements = new DOMElements();
        new UIController(elements);
    </script>
</body>
</html>
